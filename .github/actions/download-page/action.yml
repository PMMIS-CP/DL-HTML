name: "Smart Page Downloader (HTML/CSS/JS only)"
description: "Download HTML, CSS, and JavaScript assets with safe parsing, validation & Content-Type detection"

inputs:
  url:
    description: "Target URL (required if html-file not given)"
    required: false
    default: ""
  html-file:
    description: "Path to pre-downloaded HTML file (if provided, skips page download)"
    required: false
    default: ""
  output-dir:
    description: "Root output directory"
    required: false
    default: "downloads"
  user-agent:
    description: "User agent string"
    required: false
    default: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  max-depth:
    description: "Crawl depth (1=single page)"
    required: false
    default: "1"
  download-timeout:
    description: "Timeout per asset in seconds"
    required: false
    default: "15"
  preserve-protocol:
    description: "Keep original protocol for protocol-relative URLs ('true'/'false')"
    required: false
    default: "false"

outputs:
  page-folder:
    description: "Page-specific folder path"
    value: ${{ steps.structure.outputs.page_folder }}
  html-file:
    description: "Path to main HTML file"
    value: ${{ steps.download-html.outputs.html_path }}
  assets-count:
    description: "Total CSS + JS files downloaded"
    value: ${{ steps.summary.outputs.total_assets }}

runs:
  using: "composite"
  steps:
    # -----------------------------------------------
    # Step 1: Create folder structure from URL
    # -----------------------------------------------
    - name: "Generate safe folder name and structure"
      id: structure
      shell: bash
      env:
        INPUT_URL: ${{ inputs.url }}
        INPUT_HTML_FILE: ${{ inputs.html-file }}
        INPUT_OUTPUT_DIR: ${{ inputs.output-dir }}
      run: |
        # Determine the base URL for naming the folder
        if [ -n "$INPUT_HTML_FILE" ]; then
          URL_FOR_NAME="file://$INPUT_HTML_FILE"
        else
          URL_FOR_NAME="$INPUT_URL"
        fi

        # Sanitize name: replace scheme and special chars
        SAFE_NAME=$(echo "$URL_FOR_NAME" | \
          sed -E 's|^https?://||i; s|^file://||i' | \
          sed 's|/|_|g' | \
          sed 's|[^a-zA-Z0-9_.-]|_|g' | \
          sed 's/_\+/_/g' | \
          sed 's/^_//;s/_$//' | \
          cut -c1-150)
        SAFE_NAME="${SAFE_NAME:-unknown_page}"

        URL_HASH=$(echo -n "$URL_FOR_NAME" | sha256sum | cut -c1-12)
        SAFE_NAME="${SAFE_NAME}_${URL_HASH}"

        PAGE_DIR="${INPUT_OUTPUT_DIR}/${SAFE_NAME}"
        mkdir -p "$PAGE_DIR/html"
        mkdir -p "$PAGE_DIR/assets/css"
        mkdir -p "$PAGE_DIR/assets/js"
        mkdir -p "$PAGE_DIR/logs"

        echo "page_folder=$PAGE_DIR" >> "$GITHUB_OUTPUT"
        echo "safe_name=$SAFE_NAME" >> "$GITHUB_OUTPUT"
        echo "Directory structure ready: $PAGE_DIR"

    # -----------------------------------------------
    # Step 2: Download or copy main HTML
    # -----------------------------------------------
    - name: "Obtain main HTML (download or use provided file)"
      id: download-html
      shell: bash
      env:
        PAGE_DIR: ${{ steps.structure.outputs.page_folder }}
        INPUT_URL: ${{ inputs.url }}
        INPUT_HTML_FILE: ${{ inputs.html-file }}
        INPUT_USER_AGENT: ${{ inputs.user-agent }}
      run: |
        HTML_FILE="$PAGE_DIR/html/index.html"
        LOG_FILE="$PAGE_DIR/logs/curl-details.log"

        if [ -n "$INPUT_HTML_FILE" ]; then
          if [ ! -f "$INPUT_HTML_FILE" ]; then
            echo "Error: Provided HTML file does not exist: $INPUT_HTML_FILE"
            exit 1
          fi
          cp "$INPUT_HTML_FILE" "$HTML_FILE"
          echo "Using pre-downloaded HTML: $INPUT_HTML_FILE"
          HTTP_CODE=200
        else
          # Download with browser-like headers
          HTTP_CODE=$(curl -L "$INPUT_URL" \
            -A "$INPUT_USER_AGENT" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
            -H "Accept-Language: en-US,en;q=0.5" \
            -H "Accept-Encoding: gzip, deflate, br" \
            -H "DNT: 1" \
            -H "Connection: keep-alive" \
            -H "Upgrade-Insecure-Requests: 1" \
            --compressed \
            --max-time 45 \
            --retry 2 \
            --retry-delay 2 \
            --silent \
            --show-error \
            --write-out '%{http_code}' \
            --output "$HTML_FILE" \
            > "$LOG_FILE" 2>&1)
          CURL_EXIT=$?
          echo "HTTP status: $HTTP_CODE (curl exit: $CURL_EXIT)" | tee -a "$LOG_FILE"
          if [ "$HTTP_CODE" != "200" ] || [ ! -s "$HTML_FILE" ]; then
            echo "Warning: Page download failed or returned non-200. Check $LOG_FILE"
            cat > "$HTML_FILE" <<FALLBACK
<!DOCTYPE html><html><head><title>Error</title></head><body><h1>Failed to download $INPUT_URL</h1><p>HTTP $HTTP_CODE</p></body></html>
FALLBACK
            HTTP_CODE="${HTTP_CODE:-500}"
          fi
        fi

        echo "http_status=$HTTP_CODE" >> "$GITHUB_OUTPUT"
        echo "html_path=$HTML_FILE" >> "$GITHUB_OUTPUT"
        SIZE=$(stat -c%s "$HTML_FILE" 2>/dev/null || echo 0)
        echo "HTML ready: $SIZE bytes (HTTP $HTTP_CODE)"

    # -----------------------------------------------
    # Step 3: Extract and download assets with Python (fully featured)
    # -----------------------------------------------
    - name: "Parse HTML and download all CSS/JS"
      id: download-assets
      shell: bash
      env:
        PAGE_DIR: ${{ steps.structure.outputs.page_folder }}
        HTML_FILE: ${{ steps.download-html.outputs.html_path }}
        INPUT_URL: ${{ inputs.url }}
        INPUT_USER_AGENT: ${{ inputs.user-agent }}
        INPUT_DOWNLOAD_TIMEOUT: ${{ inputs.download-timeout }}
        INPUT_PRESERVE_PROTOCOL: ${{ inputs.preserve-protocol }}
      run: |
        python3 <<'PYEOF'
import os, sys, re, json, hashlib, subprocess, urllib.parse, time
from html.parser import HTMLParser

# Environment
page_dir = os.environ['PAGE_DIR']
html_file = os.environ['HTML_FILE']
input_url = os.environ.get('INPUT_URL', '')
user_agent = os.environ['INPUT_USER_AGENT']
timeout = os.environ['INPUT_DOWNLOAD_TIMEOUT']
preserve_protocol = os.environ.get('INPUT_PRESERVE_PROTOCOL', 'false').lower() == 'true'
css_dir = os.path.join(page_dir, 'assets', 'css')
js_dir = os.path.join(page_dir, 'assets', 'js')
logs_dir = os.path.join(page_dir, 'logs')

# Read HTML
with open(html_file, 'r', encoding='utf-8', errors='replace') as f:
    html_content = f.read()

# Determine base URL from <base> tag or input URL
base_url = input_url
base_match = re.search(r'<base\s[^>]*href=["\']?([^"\'\s>]+)', html_content, re.IGNORECASE)
if base_match:
    base_href = base_match.group(1)
    base_url = urllib.parse.urljoin(input_url, base_href)

# Extract the scheme of the base URL for preserve-protocol logic
base_scheme = ''
if base_url:
    parsed_base = urllib.parse.urlparse(base_url)
    base_scheme = parsed_base.scheme

# Parse HTML and collect CSS/JS links (skip data: and blob:)
class AssetExtractor(HTMLParser):
    def __init__(self):
        super().__init__()
        self.css_links = set()
        self.js_links = set()
    def handle_starttag(self, tag, attrs):
        attrs = {k.lower(): v for k, v in attrs}
        href = attrs.get('href', '').strip()
        src = attrs.get('src', '').strip()

        # Skip empty or dangerous schemes
        def is_safe(url):
            return not url.startswith('data:') and not url.startswith('blob:') and not url.startswith('javascript:')

        if tag == 'link' and href and is_safe(href):
            rel = attrs.get('rel', '').lower()
            if rel == 'stylesheet' or attrs.get('as', '').lower() == 'style':
                self.css_links.add(href)
        elif tag == 'script' and src and is_safe(src):
            self.js_links.add(src)

extractor = AssetExtractor()
extractor.feed(html_content)
css_urls = list(extractor.css_links)
js_urls = list(extractor.js_links)

print(f"Found {len(css_urls)} CSS files, {len(js_urls)} JS files")

# URL resolver with preserve-protocol support
def resolve_url(relative_url, base_url, preserve=False, base_scheme=''):
    if not base_url:
        if urllib.parse.urlparse(relative_url).scheme or relative_url.startswith('//'):
            return relative_url
        else:
            return None
    resolved = urllib.parse.urljoin(base_url, relative_url)
    # Handle preserve-protocol: if relative URL was protocol-relative (//...) and preserve is True,
    # and the base had a scheme, force that scheme instead of whatever urljoin gave (which may be https:)
    if preserve and relative_url.startswith('//') and base_scheme:
        # Replace scheme with original base scheme
        parsed = urllib.parse.urlparse(resolved)
        resolved = urllib.parse.urlunparse(parsed._replace(scheme=base_scheme))
    return resolved

download_log = []
os.makedirs(css_dir, exist_ok=True)
os.makedirs(js_dir, exist_ok=True)

def download_asset(url, dest_dir, asset_type, log_list):
    try:
        # Skip invalid schemes again (should have been filtered, but just in case)
        parsed = urllib.parse.urlparse(url)
        if parsed.scheme in ('data', 'blob', 'javascript'):
            log_list.append({"url": url, "file": "", "status": "skipped", "reason": "unsupported scheme"})
            print(f"  SKIP: {url} (unsupported scheme)")
            return False

        # Build safe filename
        path = parsed.path
        filename = os.path.basename(path)
        if not filename or filename.startswith('.'):
            filename = f"{asset_type}_{hashlib.sha256(url.encode()).hexdigest()[:8]}"
        else:
            filename = re.sub(r'\?.*$', '', filename)   # remove query
            filename = re.sub(r'[^\w\-.]', '_', filename)
            # No extension forcing yet – we'll use Content-Type

        # Temp destination
        temp_dest = os.path.join(dest_dir, f".tmp_{filename}")
        cmd = [
            'curl', '-s', '-L',
            '--compressed',
            '--max-time', timeout,
            '--retry', '2',
            '--retry-delay', '1',
            '-A', user_agent,
            '-H', 'Accept: */*',
            '--fail',
            '-o', temp_dest,
            '--write-out', '%{content_type}',
            url
        ]
        result = subprocess.run(cmd, capture_output=True, text=True)
        content_type = result.stdout.strip().split(';')[0].strip().lower() if result.stdout else ''
        curl_exit = result.returncode

        if curl_exit == 0 and os.path.getsize(temp_dest) > 0:
            # Determine correct extension from Content-Type
            ext_map = {
                'text/css': '.css',
                'application/javascript': '.js',
                'application/x-javascript': '.js',
                'text/javascript': '.js'
            }
            proper_ext = ext_map.get(content_type, f'.{asset_type}')
            # Build final filename with correct extension
            base, old_ext = os.path.splitext(filename)
            # If filename already had a valid extension that matches, keep it; else force
            if old_ext.lower() not in ('.css', '.js'):
                final_filename = base + proper_ext
            else:
                final_filename = filename   # preserve original if correct

            final_dest = os.path.join(dest_dir, final_filename)
            # Handle name collisions
            counter = 1
            while os.path.exists(final_dest):
                name, ext = os.path.splitext(final_filename)
                final_dest = os.path.join(dest_dir, f"{name}_{counter}{ext}")
                counter += 1

            os.rename(temp_dest, final_dest)
            log_list.append({"url": url, "file": os.path.basename(final_dest), "status": "success", "content_type": content_type})
            print(f"  OK: {os.path.basename(final_dest)} ({content_type})")
            return True
        else:
            # Cleanup temp file
            if os.path.exists(temp_dest):
                os.remove(temp_dest)
            err_msg = result.stderr.strip() if result.stderr else f"curl exit code {curl_exit}"
            log_list.append({"url": url, "file": filename, "status": "failed", "error": err_msg})
            print(f"  FAIL: {url}  -> {err_msg}")
            return False
    except Exception as e:
        log_list.append({"url": url, "file": filename, "status": "error", "error": str(e)})
        print(f"  ERROR: {url} - {e}")
        return False

# Download CSS
for css in css_urls:
    full_url = resolve_url(css, base_url, preserve_protocol, base_scheme)
    if full_url:
        download_asset(full_url, css_dir, 'css', download_log)
    else:
        download_log.append({"url": css, "status": "skipped", "reason": "relative URL without base"})

# Download JS
for js in js_urls:
    full_url = resolve_url(js, base_url, preserve_protocol, base_scheme)
    if full_url:
        download_asset(full_url, js_dir, 'js', download_log)
    else:
        download_log.append({"url": js, "status": "skipped", "reason": "relative URL without base"})

# Save asset download log
with open(os.path.join(logs_dir, 'assets-download.json'), 'w') as f:
    json.dump(download_log, f, indent=2)

css_count = len([f for f in os.listdir(css_dir) if f.endswith('.css')]) if os.path.isdir(css_dir) else 0
js_count = len([f for f in os.listdir(js_dir) if f.endswith('.js')]) if os.path.isdir(js_dir) else 0
total_assets = css_count + js_count

with open(os.environ['GITHUB_OUTPUT'], 'a') as gh:
    gh.write(f"css_count={css_count}\n")
    gh.write(f"js_count={js_count}\n")
    gh.write(f"total_assets={total_assets}\n")

print(f"\nAsset download complete: CSS={css_count}, JS={js_count}, Total={total_assets}")
PYEOF

    # -----------------------------------------------
    # Step 4: Metadata & final report
    # -----------------------------------------------
    - name: "Create metadata and final report"
      id: metadata
      shell: bash
      env:
        PAGE_DIR: ${{ steps.structure.outputs.page_folder }}
        INPUT_URL: ${{ inputs.url }}
        INPUT_USER_AGENT: ${{ inputs.user-agent }}
        INPUT_MAX_DEPTH: ${{ inputs.max-depth }}
        HTTP_STATUS: ${{ steps.download-html.outputs.http_status }}
      run: |
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        HTML_SIZE=$(stat -c%s "$PAGE_DIR/html/index.html" 2>/dev/null || echo 0)
        CSS_COUNT=$(find "$PAGE_DIR/assets/css" -type f -name "*.css" 2>/dev/null | wc -l)
        JS_COUNT=$(find "$PAGE_DIR/assets/js" -type f -name "*.js" 2>/dev/null | wc -l)
        TOTAL_ASSETS=$((CSS_COUNT + JS_COUNT))

        jq -n \
          --arg url "${INPUT_URL:-file}" \
          --arg date "$TIMESTAMP" \
          --arg ua "$INPUT_USER_AGENT" \
          --arg depth "$INPUT_MAX_DEPTH" \
          --arg status "$HTTP_STATUS" \
          --argjson html_size "$HTML_SIZE" \
          --argjson css_count "$CSS_COUNT" \
          --argjson js_count "$JS_COUNT" \
          --argjson total "$TOTAL_ASSETS" \
          '{
            url: $url,
            download_date: $date,
            user_agent: $ua,
            max_depth: $depth,
            http_status: $status,
            stats: {
              html_size_bytes: $html_size,
              css_count: $css_count,
              js_count: $js_count,
              total_assets: $total
            }
          }' > "$PAGE_DIR/logs/download-info.json"

        echo "html_size=$HTML_SIZE" >> "$GITHUB_OUTPUT"
        echo "css_count=$CSS_COUNT" >> "$GITHUB_OUTPUT"
        echo "js_count=$JS_COUNT" >> "$GITHUB_OUTPUT"
        echo "total_assets=$TOTAL_ASSETS" >> "$GITHUB_OUTPUT"

        echo "Download completed for ${INPUT_URL:-file}"
        echo "  Folder: $PAGE_DIR"
        echo "  HTML size: $HTML_SIZE bytes"
        echo "  Assets: CSS=$CSS_COUNT, JS=$JS_COUNT"

    # -----------------------------------------------
    # Step 5: Final outputs
    # -----------------------------------------------
    - name: "Set final outputs"
      id: summary
      shell: bash
      env:
        PAGE_DIR: ${{ steps.structure.outputs.page_folder }}
      run: |
        TOTAL=$(find "$PAGE_DIR/assets" -type f 2>/dev/null | wc -l)
        echo "total_assets=$TOTAL" >> "$GITHUB_OUTPUT"